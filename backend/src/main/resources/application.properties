# ============================================================
# Plateful — Application Configuration
# ============================================================

spring.application.name=plateful-api

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DATABASE_USERNAME:postgres.tyzqcouhdddtumxxabkl}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:plateful-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ── Razorpay ─────────────────────────────────────────────────
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_XXXXXXXXXXXXXXX}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:XXXXXXXXXXXXXXXXXXXXXXXX}

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Impact ───────────────────────────────────────────────────
app.impact.co2-per-meal-kg=2.5

