version: "3.9"

services:
  # ─── PostgreSQL Database ────────────────────────
  db:
    image: postgres:16-alpine
    container_name: plateful-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: plateful
      POSTGRES_PASSWORD: plateful_secret
      POSTGRES_DB: plateful
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plateful"]
      interval: 5s
      retries: 5

  # ─── Spring Boot Backend ────────────────────────
  backend:
    build: ./backend
    container_name: plateful-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/plateful
      SPRING_DATASOURCE_USERNAME: plateful
      SPRING_DATASOURCE_PASSWORD: plateful_secret
      JWT_SECRET: plateful-super-secret-key-must-be-at-least-256-bits-long-for-hs256
      JWT_EXPIRATION: 86400000
      RAZORPAY_KEY_ID: rzp_test_XXXXXXXXXXXXXXX
      RAZORPAY_KEY_SECRET: your_razorpay_test_secret
    depends_on:
      db:
        condition: service_healthy

  # ─── Next.js Frontend ──────────────────────────
  frontend:
    build: ./frontend
    container_name: plateful-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  pgdata:
